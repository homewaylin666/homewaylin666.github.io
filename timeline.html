    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {

      --cream:   #f7f8f5;
      --dark:    #1a1c18;
      --muted:   #4a4c45;
      --border:  rgba(26,28,24,0.12);
      --nav-h:   56px;

      --col-pub:        #1e5631;   /* deep green   */

      --col-service:    #173a8a;   /* deep blue    */

    html, body { height: 100%; }
    body {

      background: var(--cream);
      color: var(--dark);
      overflow: hidden;            /* page itself never scrolls */

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: var(--nav-h);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2.5rem;
      background: rgba(247,248,245,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
    }
    .nav-name {
      font-family: 'Playfair Display', serif; font-weight: 400;
      font-size: 1.05rem; letter-spacing: 0.1em; color: var(--dark);
      text-decoration: none; text-transform: uppercase;
    }
    .nav-links { display: flex; gap: 2.2rem; list-style: none; }
    .nav-links a {
      font-size: 0.75rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted); text-decoration: none; transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--dark); }
    .nav-links a.active { color: var(--sage); }

    /* ── LEGENDS ── */

      position: fixed; bottom: 14px; z-index: 150;
      display: flex; flex-direction: column; gap: 7px;
      background: rgba(247,248,245,0.95);
      border: 0.5px solid var(--border); border-radius: 6px;
      padding: 14px 18px; box-shadow: 0 2px 14px rgba(26,28,24,0.09);
    }
    .legend { right: 1.25rem; }
    .edu-legend { left: 1.25rem; }
    .legend-title {
      font-family: 'JetBrains Mono', monospace; font-size: 0.82rem;
      letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted);
      margin-bottom: 5px;
    }
    .legend-row {
      display: flex; align-items: center; gap: 10px;
      font-family: 'JetBrains Mono', monospace; font-size: 0.86rem; color: var(--muted);
    }
    .legend-dot { width: 15px; height: 15px; border-radius: 50%; flex-shrink: 0; }
    .legend-dot.rainbow { background: var(--rainbow); }
    .edu-bar-legend { width: 32px; height: 13px; border-radius: 2px; flex-shrink: 0; }

    /* ── SCROLL CONTAINER (horizontal only) ── */
    .scroll-outer {
      position: fixed; top: var(--nav-h); left: 0; right: 0; bottom: 0;
      overflow-x: auto; overflow-y: hidden; cursor: grab;
    }
    .scroll-outer:active { cursor: grabbing; }
    .scroll-outer::-webkit-scrollbar { height: 5px; }
    .scroll-outer::-webkit-scrollbar-track { background: rgba(26,28,24,0.04); }
    .scroll-outer::-webkit-scrollbar-thumb { background: rgba(138,158,126,0.4); border-radius: 2px; }

    #canvas-wrap { position: relative; font-size: 13px; }   /* font-size scaled by JS for auto-fit */
    #canvas-wrap::before {
      content: ''; position: absolute; inset: 0;
      background-image:

        linear-gradient(90deg, rgba(26,28,24,0.025) 1px, transparent 1px);
      background-size: 60px 60px; pointer-events: none;
    }
    #svg-layer { position: absolute; inset: 0; pointer-events: none; }

      font-size: 0.85rem; letter-spacing: 0.1em; color: rgba(26,28,24,0.22);

    }
    .end-label {
      position: absolute; font-family: 'JetBrains Mono', monospace;
      font-size: 1.24rem; letter-spacing: 0.08em; color: var(--muted); font-weight: 500;
      transform: translateX(-50%); white-space: nowrap; pointer-events: none;
      text-align: center; text-transform: uppercase; line-height: 1.3;
    }

    /* ── EVENT BLOCKS ── */
    .tl-block {
      position: absolute; display: flex; flex-direction: column; align-items: center; gap: 0.34em;
      width: max-content; transform: translateX(-50%);

    /* all event cards share Honour's size now; only the border treatment differs */
    .node-card {
      padding: 0.7em 1em; border-radius: 6px; border: 4px solid;
      background: rgba(255,255,255,0.92);
      max-width: 32em; cursor: pointer; transition: box-shadow 0.15s, background 0.15s;

    .node-type-badge {

      letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; margin-bottom: 4px; text-align: center;

      letter-spacing: 0.02em; line-height: 1.35; color: var(--dark); text-align: center;

    .skill-card {

    .skill-star { font-size: 2.6em; line-height: 1; }
    .skill-badge-label {
      font-family: 'JetBrains Mono', monospace; font-size: 1.2em;
      letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500;
    }
    .skill-name {
      font-family: 'JetBrains Mono', monospace; font-size: 1.6em; font-weight: 500;
      letter-spacing: 0.02em; line-height: 1.3; color: var(--dark); margin-top: 3px; white-space: nowrap;
    }
    .skill-prog {
      font-family: 'JetBrains Mono', monospace; font-size: 1.05em;
      letter-spacing: 0.04em; margin-top: 2px; font-weight: 500;

    .skill-grid { display: flex; flex-direction: column; gap: 0.5em; }
    .skill-grid-row { display: flex; flex-direction: row; justify-content: center; gap: 1.5em; }

    /* ── MINIMAP / RANGE (bottom-right) ── */
    #minimap-panel {
      position: fixed; left: 50%; transform: translateX(-50%); bottom: 14px; z-index: 160;

      border: 0.5px solid var(--border); border-radius: 5px;

    #mini-hint {
      font-family: 'JetBrains Mono', monospace; font-size: 0.56rem;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--sage);
      text-align: center; margin-bottom: 5px;
    }
    #range-readout {

      background: rgba(138,158,126,0.16); box-sizing: border-box;
    }
    #mini-window::after {
      content: ''; position: absolute; left: 50%; bottom: -5px; transform: translateX(-50%);

      border-top: 5px solid var(--sage);
    }
    #minimap-svg { display: block; width: 100%; }

    /* ── TOOLTIP ── */
    #tooltip {
      position: fixed; z-index: 300; background: rgba(26,28,24,0.93);
      border-radius: 4px; padding: 8px 12px; max-width: 260px;
      pointer-events: none; opacity: 0; transition: opacity 0.15s;
      font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; line-height: 1.6;
      color: rgba(255,255,255,0.82);
    }
    #tooltip.visible { opacity: 1; }
    #tooltip .tt-title { font-size: 0.72rem; color: #fff; margin-bottom: 3px; font-family:'Inter',sans-serif; }

    @media (max-width: 760px) {
      nav { padding: 0 1rem; }
      .nav-links { gap: 0.7rem; }
      .nav-links a { font-size: 0.5rem; }
      .legend, .edu-legend { padding: 6px 8px; }
      .legend-row { font-size: 0.5rem; gap: 5px; }
      .legend-title { font-size: 0.5rem; }
      #minimap-panel { width: 94vw; }
    }
  </style>
</head>

function el(tag, cls){ const e=document.createElement(tag); if(cls) e.className=cls; return e; }

// ═══ BUILD BLOCKS (returns array, appended + measured) ════
function makeEventBlock(ev, attachedSkills){
  const meta = TYPE_META[ev.type];
  const isRainbow = meta.col === 'rainbow';
  const block = el('div','tl-block');

  const card = el('div','node-card' + (isRainbow?' rainbow':''));
  if(!isRainbow) card.style.borderColor = meta.col;
  const badge = el('div','node-type-badge' + (isRainbow?' rainbow':''));
  if(!isRainbow) badge.style.color = meta.col;
  badge.textContent = meta.badge;
  const lbl = el('div','node-label');
  lbl.textContent = ev.label;
  card.append(badge, lbl);
  addTip(card, ev.label, ev.full, isRainbow?'#f59e0b':null);

  block._project = card;
  let grid = null;
  if(attachedSkills.length){
    grid = el('div','skill-grid');     // rows of two; odd one ends up centred on the far row
    for(let i=0;i<attachedSkills.length;i+=2){
      const row = el('div','skill-grid-row');
      row.appendChild(makeSkillCard(attachedSkills[i]));
      if(attachedSkills[i+1]) row.appendChild(makeSkillCard(attachedSkills[i+1]));
      grid.appendChild(row);
    }
    block.append(card, grid);
  } else {
    block.append(card);
  }
  block._grid = grid;
  block.dataset.type = ev.type;
  block.dataset.anchorId = ev.id;
  block._date = ev.date;
  block._type = ev.type;
  return block;
}
function makeSkillCard(sk){
  const col = SKILL_COL[sk.level];
  const card = el('div','skill-card');
  const top = el('div','skill-top');
  const star = el('span','skill-star'); star.style.color = col;
  star.style.textShadow = '0 0 10px '+col+', 0 0 3px '+col; star.textContent = '★';
  const b = el('span','skill-badge-label'); b.style.color = col; b.textContent = 'SKILL UPGRADE';
  top.append(star, b);
  const n = el('div','skill-name'); n.textContent = sk.name;
  const p = el('div','skill-prog'); p.style.color = col; p.textContent = SKILL_PROG[sk.level];
  card.append(top, n, p);
  addTip(card, sk.name + ' — Skill Upgrade', sk.full + ' · ' + SKILL_PROG[sk.level], null);
  return card;
}
function makeStandaloneSkillBlock(sk){
  const block = el('div','tl-block');
  const card = makeSkillCard(sk);
  block.append(card);
  block._project = card; block._skills = [];
  block.dataset.type = 'skill-'+sk.level;
  block._date = sk.date;
  block._type = 'skill';
  block._skillLevel = sk.level;
  return block;
}

// ═══ PACKING + AUTO-FIT ═══════════════════════════════════
let blocks = [];           // current rendered blocks (for scroll handlers not needed)
function render(scale){
  // clear
  Array.from(wrap.children).forEach(c => { if(c.id!=='svg-layer') c.remove(); });
  svgEl.innerHTML = '';
  wrap.style.fontSize = (13*scale)+'px';

  const TOTAL_W = totalW();
  const VH = window.innerHeight;
  const CANVAS_H = VH - NAV_H;
  wrap.style.width  = TOTAL_W + 'px';
  wrap.style.height = CANVAS_H + 'px';
  svgEl.setAttribute('width', TOTAL_W);
  svgEl.setAttribute('height', CANVAS_H);

  // overlay-safe region
  const TOP_PAD = 75, BOT_PAD = 175, NEAR = 120*scale, GAP_Y = 14*scale, GAP_X = 12*scale;
  const avail   = CANVAS_H - TOP_PAD - BOT_PAD;
  const LINE_Y  = TOP_PAD + avail/2;
  const availSide = avail/2 - NEAR;

  // rainbow gradient def (for honour dots)
  const defs = mkSVG('defs');
  const grad = mkSVG('linearGradient', { id:'rainbowGrad', x1:'0', y1:'0', x2:'1', y2:'0' });
  [['0','#e11d48'],['0.2','#f59e0b'],['0.4','#eab308'],['0.6','#22c55e'],['0.8','#3b82f6'],['1','#8b5cf6']]
    .forEach(([o,c]) => grad.appendChild(mkSVG('stop',{offset:o,'stop-color':c})));
  defs.appendChild(grad); svgEl.appendChild(defs);

  // center line
  svgEl.appendChild(mkSVG('line',{x1:0,y1:LINE_Y,x2:TOTAL_W,y2:LINE_Y,stroke:'rgba(26,28,24,0.16)','stroke-width':'1.5'}));

  // education bars
  EDU_PHASES.forEach(ph => {
    const x1=dateToX(ph.start), x2=Math.min(dateToX(ph.end), dateToX(END)), w=x2-x1, BAR_H=8;
    if(ph.camouflage){
      const pid='camo'+Math.random().toString(36).slice(2,7);
      const d2=mkSVG('defs'); const pat=mkSVG('pattern',{id:pid,x:0,y:0,width:10,height:10,patternUnits:'userSpaceOnUse'});
      [['#8a9e6a',0],['#5a6e3a',1],['#7a9050',2],['#4a5e2a',3]].forEach(([c,i])=>pat.appendChild(mkSVG('rect',{x:(i%2)*5,y:Math.floor(i/2)*5,width:5,height:5,fill:c,opacity:'0.7'})));
      d2.appendChild(pat); svgEl.appendChild(d2);
      svgEl.appendChild(mkSVG('rect',{x:x1,y:LINE_Y-BAR_H/2,width:w,height:BAR_H,fill:`url(#${pid})`}));
    } else {
      svgEl.appendChild(mkSVG('rect',{x:x1,y:LINE_Y-BAR_H/2,width:w,height:BAR_H,fill:ph.color}));
    }
  });

  // year ticks + labels
  const y0 = START.getFullYear()+1, y1 = END.getFullYear();
  for(let y=y0; y<=y1; y++){
    const x=dateToX(`${y}-01-01`);
    svgEl.appendChild(mkSVG('line',{x1:x,y1:LINE_Y-13,x2:x,y2:LINE_Y+13,stroke:'rgba(26,28,24,0.18)','stroke-width':'1'}));
    const l=el('div','year-label'); l.textContent=y; l.style.cssText=`left:${x}px; top:${LINE_Y+16}px;`; wrap.appendChild(l);
  }

  // end labels
  const lE=el('div','end-label'); lE.innerHTML='◀ Undergraduate<br>Enrolment';
  lE.style.cssText=`left:${dateToX(START)}px; top:${LINE_Y+42}px;`; wrap.appendChild(lE);
  const rE=el('div','end-label'); rE.innerHTML='Today<br>'+fmtDay(END)+' ▶';
  rE.style.cssText=`left:${dateToX(END)}px; top:${LINE_Y+42}px;`; wrap.appendChild(rE);

  // ── build blocks ──
  const skillsByProj = {};
  SKILLS.forEach(sk => { if(sk.projectId){ (skillsByProj[sk.projectId] ||= []).push(sk); } });
  blocks = [];
  EVENTS.forEach(ev => {
    const attached = (ev.type==='project') ? (skillsByProj[ev.id]||[]) : [];
    const b = makeEventBlock(ev, attached);
    b.style.visibility='hidden'; wrap.appendChild(b); blocks.push(b);
  });
  SKILLS.filter(s=>!s.projectId).forEach(sk => {
    const b = makeStandaloneSkillBlock(sk);
    b.style.visibility='hidden'; wrap.appendChild(b); blocks.push(b);
  });

  // measure
  blocks.forEach(b => { b._w=b.offsetWidth; b._h=b.offsetHeight; b._x=dateToX(b._date); });
  // pack by date order
  blocks.sort((a,b)=>a._x-b._x);

  const sides = { above:[], below:[] };   // each = array of shelves; shelf={items:[{x1,x2}], h}
  function tryPlace(shelf, b){
    const halfW=b._w/2, want=[b._x-halfW-GAP_X, b._x+halfW+GAP_X];
    let overlap=false;
    for(const it of shelf.items){ if(want[0]<it.x2 && want[1]>it.x1){ overlap=true; break; } }
    if(!overlap) return {nudge:0};
    // try nudging right/left; cap at NEAR (= shelf-0 vertical distance) so the
    // connector never exceeds 45° (horizontal shift <= vertical drop)
    const MAXN=NEAR, STEP=Math.max(4,5*scale);
    for(let n=STEP; n<=MAXN; n+=STEP){
      for(const dir of [1,-1]){
        const dx=dir*n, w2=[want[0]+dx, want[1]+dx]; let ok=true;
        for(const it of shelf.items){ if(w2[0]<it.x2 && w2[1]>it.x1){ ok=false; break; } }
        if(ok) return {nudge:dx};
      }
    }
    return null;
  }
  blocks.forEach(b => {
    let best=null; // {side, shelfIdx, nudge, cost}
    for(const sideName of ['above','below']){
      const shelves=sides[sideName];
      for(let i=0;i<shelves.length;i++){
        const pl=tryPlace(shelves[i], b);
        if(pl){ const cost=i*1000+Math.abs(pl.nudge)+(sideName==='below'?2:0); if(!best||cost<best.cost) best={side:sideName,shelfIdx:i,nudge:pl.nudge,cost}; break; }
      }
      const newCost=shelves.length*1000+(sideName==='below'?2:0);
      if(!best||newCost<best.cost) best={side:sideName,shelfIdx:shelves.length,nudge:0,cost:newCost,isNew:true};
    }
    const shelves=sides[best.side];
    if(best.isNew||best.shelfIdx>=shelves.length){ shelves.push({items:[],h:0}); best.shelfIdx=shelves.length-1; }
    const shelf=shelves[best.shelfIdx];
    const halfW=b._w/2;
    shelf.items.push({x1:b._x+best.nudge-halfW-GAP_X, x2:b._x+best.nudge+halfW+GAP_X});
    shelf.h=Math.max(shelf.h,b._h);
    b._side=best.side; b._shelfIdx=best.shelfIdx; b._nudge=best.nudge;
  });

  // compute shelf offsets (cumulative)
  ['above','below'].forEach(s=>{ let off=NEAR; sides[s].forEach(sh=>{ sh.nearOff=off; off+=sh.h+GAP_Y; }); sides[s]._used=off-GAP_Y; });
  const fits = (sides.above._used<=avail/2) && (sides.below._used<=avail/2);

  // position blocks + connectors
  blocks.forEach(b => {
    const shelf=sides[b._side][b._shelfIdx];
    const cardX=b._x+b._nudge;
    let topY;
    if(b._side==='above'){ const nearEdge=LINE_Y-shelf.nearOff; topY=nearEdge-b._h; b.style.flexDirection='column-reverse'; if(b._grid) b._grid.style.flexDirection='column-reverse'; }
    else { topY=LINE_Y+shelf.nearOff; b.style.flexDirection='column'; if(b._grid) b._grid.style.flexDirection='column'; }
    b.style.left=cardX+'px'; b.style.top=topY+'px'; b.style.visibility='visible';

    // dot + connector on line
    const isHon = (b._type==='honor');
    let lineCol, dotFill='var(--cream)', dotStroke, dotR=5.5, dotSW='2.4';
    if(b._type==='skill'){ const c=(b._skillLevel==='proficient'?'#d4af37':'#b87333'); lineCol=c; dotStroke=c; }
    else if(isHon){ lineCol='#7c3aed'; dotFill='url(#rainbowGrad)'; dotStroke='#7c3aed'; dotSW='1.5'; dotR=6.5; }
    else { const c=getComputedStyle(document.documentElement).getPropertyValue(TYPE_META[b._type].col.replace('var(','').replace(')','')).trim(); lineCol=c; dotStroke=c; }
    const lineEdgeY = b._side==='above'? LINE_Y-6 : LINE_Y+6;
    const nearEdgeY = b._side==='above'? LINE_Y-shelf.nearOff : LINE_Y+shelf.nearOff;
    // connector (may slant ≤45°) — drawn for EVERY block, incl. honour
    svgEl.appendChild(mkSVG('line',{x1:b._x,y1:lineEdgeY,x2:cardX,y2:nearEdgeY,stroke:lineCol,'stroke-width':'1.7',opacity:'0.55'}));
    svgEl.appendChild(mkSVG('circle',{cx:b._x,cy:LINE_Y,r:dotR,fill:dotFill,stroke:dotStroke,'stroke-width':dotSW}));
  });

  return { fits, sides };
}

// auto-fit: keep text as large as possible; if it doesn't fit vertically,
// spread the timeline wider (more px/day) before shrinking the font.
function build(){
  const scaleOpts = [1, 0.92, 0.84, 0.76, 0.68, 0.6];
  const pxOpts    = [3.0, 3.8, 4.8, 6.2, 8.0];
  let done=false;
  for(const sc of scaleOpts){
    for(const px of pxOpts){
      PX_PER_DAY = px;
      if(render(sc).fits){ done=true; break; }
    }
    if(done) break;
  }
  if(!done){ PX_PER_DAY = pxOpts[pxOpts.length-1]; render(scaleOpts[scaleOpts.length-1]); }
  buildMinimap();
  updateScrollUI();
}

// ═══ MINIMAP ══════════════════════════════════════════════
const miniSvg = document.getElementById('minimap-svg');
function buildMinimap(){
  const W = miniSvg.clientWidth || 300, H = 46;
  miniSvg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  miniSvg.innerHTML='';
  const axisY = 30;
  const mapX = d => 6 + (new Date(d)-START)/(END-START)*(W-12);
  // base line
  miniSvg.appendChild(mkSVG('line',{x1:6,y1:axisY,x2:W-6,y2:axisY,stroke:'rgba(26,28,24,0.25)','stroke-width':'1'}));
  // year main ticks
  for(let y=START.getFullYear()+1; y<=END.getFullYear(); y++){
    const x=mapX(`${y}-01-01`);
    miniSvg.appendChild(mkSVG('line',{x1:x,y1:axisY-5,x2:x,y2:axisY+5,stroke:'rgba(26,28,24,0.32)','stroke-width':'1'}));
    const t=mkSVG('text',{x:x,y:axisY+15,'text-anchor':'middle','font-size':'7','font-family':'JetBrains Mono, monospace',fill:'rgba(26,28,24,0.4)'});
    t.textContent=("'"+String(y).slice(2)); miniSvg.appendChild(t);
  }
  // event ticks (ultra-thin), colored
  EVENTS.forEach(ev=>{
    const x=mapX(ev.date), c=TYPE_META[ev.type].mini;
    miniSvg.appendChild(mkSVG('line',{x1:x,y1:axisY-9,x2:x,y2:axisY,stroke:c,'stroke-width':'1'}));
  });
  // skill ticks: bound skills hug RIGHT of their project tick; unbound at own date
  const projX = {}; EVENTS.forEach(ev=>{ if(ev.type==='project') projX[ev.id]=mapX(ev.date); });
  SKILLS.forEach(sk=>{
    let x = sk.projectId && projX[sk.projectId]!=null ? projX[sk.projectId]+1.4 : mapX(sk.date);
    const c=SKILL_MINI[sk.level];
    miniSvg.appendChild(mkSVG('line',{x1:x,y1:axisY,x2:x,y2:axisY+8,stroke:c,'stroke-width':'0.8'}));
  });
}

// ═══ SCROLL UI (range + window box) ═══════════════════════
const rangeOut = document.getElementById('range-readout');
const miniWin  = document.getElementById('mini-window');
function updateScrollUI(){
  const sl=scrollEl.scrollLeft, cw=scrollEl.clientWidth, sw=scrollEl.scrollWidth;
  const dL=xToDate(sl), dR=xToDate(sl+cw);
  rangeOut.innerHTML = `<b>${fmtMonthYear(dL)}</b> &nbsp;—&nbsp; <b>${fmtMonthYear(dR)}</b>`;
  const track=document.getElementById('mini-window-track');
  const tw=track.clientWidth;
  const left = sw>0 ? sl/sw*tw : 0;
  const wWidth = sw>0 ? Math.max(8, cw/sw*tw) : tw;
  miniWin.style.left = Math.min(left, tw-wWidth)+'px';
  miniWin.style.width = wWidth+'px';
}

// ═══ TOOLTIP ══════════════════════════════════════════════
function addTip(target,title,body,forceCol){
  target.addEventListener('mouseenter', e=>{
    tip.innerHTML=`<div class="tt-title">${title}</div>${body}`;
    tip.classList.add('visible'); moveTip(e);
  });
  target.addEventListener('mouseleave', ()=>tip.classList.remove('visible'));
}
function moveTip(e){
  let x=e.clientX+14, y=e.clientY-8;
  if(x+270>window.innerWidth) x=e.clientX-280;
  if(y+90>window.innerHeight) y=e.clientY-95;
  tip.style.left=x+'px'; tip.style.top=y+'px';
}
document.addEventListener('mousemove', e=>{ if(tip.classList.contains('visible')) moveTip(e); });

// ═══ DRAG (horizontal) ════════════════════════════════════
let isDown=false, startX, sLeft;
scrollEl.addEventListener('mousedown', e=>{ isDown=true; startX=e.pageX; sLeft=scrollEl.scrollLeft; scrollEl.style.cursor='grabbing'; });
scrollEl.addEventListener('mouseleave', ()=>{ isDown=false; scrollEl.style.cursor='grab'; });
scrollEl.addEventListener('mouseup', ()=>{ isDown=false; scrollEl.style.cursor='grab'; });
scrollEl.addEventListener('mousemove', e=>{ if(!isDown) return; e.preventDefault(); scrollEl.scrollLeft=sLeft-(e.pageX-startX)*1.2; });
scrollEl.addEventListener('scroll', updateScrollUI);
scrollEl.addEventListener('wheel', e=>{ if(Math.abs(e.deltaY)>Math.abs(e.deltaX)){ scrollEl.scrollLeft+=e.deltaY; } }, {passive:true});

// ═══ MINIMAP NAVIGATION (click / drag to jump) ═══════════
const miniPanel = document.getElementById('minimap-panel');
miniPanel.style.cursor = 'pointer';
function miniScrub(clientX){
  const track = document.getElementById('mini-window-track');
  const r = track.getBoundingClientRect();
  let frac = (clientX - r.left) / r.width;
  frac = Math.max(0, Math.min(1, frac));
  const sw = scrollEl.scrollWidth, cw = scrollEl.clientWidth;
  scrollEl.scrollLeft = Math.max(0, Math.min(sw - cw, frac * sw - cw/2));
  updateScrollUI();
}
let miniDown = false;
miniPanel.addEventListener('mousedown', e => { miniDown = true; miniScrub(e.clientX); e.preventDefault(); e.stopPropagation(); });
window.addEventListener('mousemove', e => { if(miniDown) miniScrub(e.clientX); });
window.addEventListener('mouseup', () => { miniDown = false; });
miniPanel.addEventListener('touchstart', e => { if(e.touches[0]){ miniScrub(e.touches[0].clientX); } }, {passive:true});
miniPanel.addEventListener('touchmove',  e => { if(e.touches[0]){ miniScrub(e.touches[0].clientX); } }, {passive:true});

// ═══ INIT ═════════════════════════════════════════════════
build();
requestAnimationFrame(()=>{ scrollEl.scrollLeft=scrollEl.scrollWidth-scrollEl.clientWidth; updateScrollUI(); });
let rT; window.addEventListener('resize', ()=>{ clearTimeout(rT); rT=setTimeout(()=>{ build(); }, 150); });
window.addEventListener('orientationchange', ()=>setTimeout(build,200));
</script>
