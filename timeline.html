  wrap.style.width  = TOTAL_W + 'px';
  wrap.style.height = CANVAS_H + 'px';

  svgEl.setAttribute('height', CANVAS_H);

    stroke:'rgba(26,28,24,0.15)', 'stroke-width':'1.5'

      const pat  = mkSVG('pattern', { id:pid, x:0, y:0, width:10, height:10, patternUnits:'userSpaceOnUse' });
      [['#8a9e6a',0],['#5a6e3a',1],['#7a9050',2],['#4a5e2a',3]].forEach(([c,i]) => {
        pat.appendChild(mkSVG('rect', { x:(i%2)*5, y:Math.floor(i/2)*5, width:5, height:5, fill:c, opacity:'0.7' }));
      });
      defs.appendChild(pat); svgEl.appendChild(defs);
      svgEl.appendChild(mkSVG('rect', { x:x1, y:ly-BAR_H/2, width:w, height:BAR_H, fill:`url(#${pid})` }));
    } else {
      svgEl.appendChild(mkSVG('rect', { x:x1, y:ly-BAR_H/2, width:w, height:BAR_H, fill:ph.color }));
    }
  });

  // ── year ticks + labels ──
  for (let y = 2019; y <= 2026; y++) {
    const x = dateToX(`${y}-01-01`);
    svgEl.appendChild(mkSVG('line', {
      x1:x, y1:ly-14, x2:x, y2:ly+14,
      stroke:'rgba(26,28,24,0.18)', 'stroke-width':'1'
    }));
    const lbl = document.createElement('div');
    lbl.className = 'year-label';
    lbl.textContent = y;
    lbl.style.cssText = `left:${x}px; top:${ly+18}px;`;
    wrap.appendChild(lbl);
  }

  // ── node positions (for dashed lines) ──
  const nodePos = {};

  // ── ABOVE events ──
  ABOVE_EVENTS.forEach(ev => {
    const x   = dateToX(ev.date);
    const col = ev.type === 'honor' ? C.honor : C.pub;
    const cardY = ly - ROW_H_ABOVE * (ev.stagger + 1);

    svgEl.appendChild(mkSVG('line', {
      x1:x, y1:ly-6, x2:x, y2:cardY+4,
      stroke:col, 'stroke-width':'1', opacity:'0.35'
    }));
    svgEl.appendChild(mkSVG('circle', {
      cx:x, cy:ly, r:6,
      fill:'var(--cream)', stroke:col, 'stroke-width':'2.2'
    }));

    const card = el('div', 'node-card');
    card.style.cssText = `left:${x}px; top:${cardY}px; transform:translateX(-50%) translateY(-100%); border-color:${col}55;`;
    const badge = el('div', 'node-type-badge');
    badge.style.color = col;
    badge.textContent = ev.type === 'honor' ? '★  HONOUR' : '◆  PUB';
    const lbl = el('div', 'node-label');
    lbl.textContent = ev.label;
    if (ev.type === 'honor') { lbl.style.color = col; card.style.borderColor = col + '88'; }
    card.append(badge, lbl);
    addTip(card, ev.label, ev.full, col);
    wrap.appendChild(card);
    nodePos[ev.id] = { x, y: ly };
  });

  // ── BELOW events ──
  BELOW_EVENTS.forEach(ev => {
    const x   = dateToX(ev.date);
    const col = ev.type === 'service' ? C.service : C.project;
    const cardY = ly + ROW_H_BELOW * (ev.stagger + 1);

    svgEl.appendChild(mkSVG('line', {
      x1:x, y1:ly+6, x2:x, y2:cardY-2,
      stroke:col, 'stroke-width':'1', opacity:'0.35'
    }));
    svgEl.appendChild(mkSVG('circle', {
      cx:x, cy:ly, r:6,
      fill:'var(--cream)', stroke:col, 'stroke-width':'2.2'
    }));

    const card = el('div', 'node-card');
    card.style.cssText = `left:${x}px; top:${cardY}px; transform:translateX(-50%); border-color:${col}55;`;
    const badge = el('div', 'node-type-badge');
    badge.style.color = col;
    badge.textContent = ev.type === 'service' ? '▪  SERVICE' : '▸  PROJECT';
    const lbl = el('div', 'node-label');
    lbl.textContent = ev.label;
    card.append(badge, lbl);
    addTip(card, ev.label, ev.full, col);
    wrap.appendChild(card);
    nodePos[ev.id] = { x, y: ly };
  });

  // ── SKILLS ──
  SKILLS.forEach(sk => {
    const x   = dateToX(sk.date);
    const col = sk.level === 'proficient' ? C.proficient : C.familiar;
    const filledPips = sk.level === 'proficient' ? 2 : 1;
    const badgeY = ly + ROW_H_BELOW * (sk.stagger + 1);

    // connector from line to badge
    svgEl.appendChild(mkSVG('line', {
      x1:x, y1:ly+6, x2:x, y2:badgeY-4,
      stroke:col, 'stroke-width':'0.8', opacity:'0.2'
    }));

    // dashed line to project node
    if (sk.projectId && nodePos[sk.projectId]) {
      const proj = nodePos[sk.projectId];
      const mx = (proj.x + x) / 2;
      svgEl.appendChild(mkSVG('path', {
        d: `M${proj.x},${proj.y+6} C${proj.x},${badgeY-20} ${x},${proj.y+6} ${x},${badgeY}`,
        stroke: col, 'stroke-width':'1', 'stroke-dasharray':'4 3',
        fill:'none', opacity:'0.45'
      }));
    }

    // badge DOM
    const badge = el('div','skill-badge');
    badge.style.cssText = `left:${x}px; top:${badgeY}px; color:${col};`;

    const pipRow = el('div','skill-pip-row');
    for (let i = 0; i < 2; i++) {
      const pip = el('div', 'skill-pip ' + (i < filledPips ? 'filled' : 'empty'));
      pip.style.background = col;
      pipRow.appendChild(pip);
    }

    const inner = el('div','skill-inner');
    inner.style.borderColor = col + '66';

    const sName = el('div','skill-name');
    sName.textContent = sk.name.replace(/\n/g,' ');

    const sLevel = el('div','skill-level-text');
    sLevel.style.color = col;
    sLevel.textContent = sk.level === 'proficient' ? '▲ PROFICIENT' : '◉ FAMILIAR';

    inner.append(sName, sLevel);
    badge.append(pipRow, inner);
    addTip(badge, sk.name.replace(/\n/g,' '), sk.full, col);
    wrap.appendChild(badge);
  });
}

// ─── HELPERS ──────────────────────────────────────────────
function mkSVG(tag, attrs = {}) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  return e;
}
function el(tag, cls = '') {
  const e = document.createElement(tag.split('.')[0]);
  if (cls) e.className = cls;
  return e;
}

// ─── TOOLTIP ──────────────────────────────────────────────
const tip = document.getElementById('tooltip');
function addTip(target, title, body, col) {
  target.addEventListener('mouseenter', e => {
    tip.innerHTML = `<div class="tt-title" style="color:${lighten(col)}">${title}</div>${body}`;
    tip.classList.add('visible');
    moveTip(e);
  });
  target.addEventListener('mouseleave', () => tip.classList.remove('visible'));
}
function moveTip(e) {
  let x = e.clientX + 14, y = e.clientY - 8;
  if (x + 270 > window.innerWidth)  x = e.clientX - 280;
  if (y + 90  > window.innerHeight) y = e.clientY - 95;
  tip.style.left = x + 'px'; tip.style.top = y + 'px';
}
function lighten(hex) { return hex; } // colors already chosen for cream bg
document.addEventListener('mousemove', e => { if (tip.classList.contains('visible')) moveTip(e); });

// ─── DRAG ─────────────────────────────────────────────────
let isDown = false, startX, startY, sLeft, sTop;
scrollEl.addEventListener('mousedown', e => {
  isDown = true; startX = e.pageX; startY = e.pageY;
  sLeft = scrollEl.scrollLeft; sTop = scrollEl.scrollTop;
  scrollEl.style.cursor = 'grabbing';
});
scrollEl.addEventListener('mouseleave', () => { isDown = false; scrollEl.style.cursor = 'grab'; });
scrollEl.addEventListener('mouseup',    () => { isDown = false; scrollEl.style.cursor = 'grab'; });
scrollEl.addEventListener('mousemove', e => {
  if (!isDown) return; e.preventDefault();
  scrollEl.scrollLeft = sLeft - (e.pageX - startX) * 1.2;
  scrollEl.scrollTop  = sTop  - (e.pageY - startY) * 1.2;
});

// ─── INIT ─────────────────────────────────────────────────
build();
requestAnimationFrame(() => {
  scrollEl.scrollLeft = scrollEl.scrollWidth - scrollEl.clientWidth;
  scrollEl.scrollTop = 0;
});
window.addEventListener('resize', build);
</script>
</body>
