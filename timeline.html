    :root {

      --dark:   #1a1c18;
      --nav-h:  56px;
      --bg:     #0d0f0b;
      --line-h: 4px;
      --above-h: 280px;
      --below-h: 320px;

      /* Education phase colors */
      --edu-bsc:   #b8dfc0;
      --edu-mres:  #80c494;
      --edu-gap:   #8a8880;
      --edu-mil:   #6b7c5a;
      --edu-dphil: #4a6e55;

      --col-honor:   #c9a227;
      --col-project: #7ab8d4;
      --col-service: #b08fd4;

      --col-proficient: #a8c86a;

    html, body { height: 100%; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: #ccc;
      overflow-x: hidden;
      overflow-y: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      background: rgba(13,15,11,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid rgba(138,158,126,0.2);
    }
    .nav-name {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: 1.05rem;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      text-transform: uppercase;
    }
    .nav-links { display: flex; gap: 2.2rem; list-style: none; }
    .nav-links a {
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: rgba(255,255,255,0.75); }
    .nav-links a.active { color: var(--sage); }

    /* ── LEGEND ── */
    .legend {
      position: fixed;
      top: calc(var(--nav-h) + 12px);
      right: 1.5rem;
      z-index: 150;
      display: flex;
      flex-direction: column;
      gap: 5px;
      background: rgba(13,15,11,0.85);
      border: 0.5px solid rgba(138,158,126,0.2);
      border-radius: 4px;
      padding: 10px 12px;
    }
    .legend-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 4px;
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      color: rgba(255,255,255,0.5);
    }
    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-line {
      width: 14px; height: 1px;
      flex-shrink: 0;
      border-top: 1.5px dashed;
    }

    /* ── EDU LEGEND ── */
    .edu-legend {
      position: fixed;
      top: calc(var(--nav-h) + 12px);
      left: 1.5rem;
      z-index: 150;
      display: flex;
      flex-direction: column;
      gap: 5px;
      background: rgba(13,15,11,0.85);
      border: 0.5px solid rgba(138,158,126,0.2);
      border-radius: 4px;
      padding: 10px 12px;
    }
    .edu-bar-legend {
      width: 22px; height: 8px;
      border-radius: 1px;
      flex-shrink: 0;
    }

    /* ── SCROLL CONTAINER ── */
    .scroll-outer {
      position: fixed;
      top: var(--nav-h);
      left: 0; right: 0;
      bottom: 0;
      overflow-x: auto;
      overflow-y: hidden;
      cursor: grab;
    }
    .scroll-outer:active { cursor: grabbing; }
    .scroll-outer::-webkit-scrollbar { height: 4px; }
    .scroll-outer::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
    .scroll-outer::-webkit-scrollbar-thumb { background: rgba(138,158,126,0.3); border-radius: 2px; }

    /* ── CANVAS WRAPPER ── */
    #canvas-wrap {
      position: relative;
      height: calc(100vh - var(--nav-h));
      /* width set by JS */
    }

    /* Subtle grid */
    #canvas-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(138,158,126,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(138,158,126,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* ── SVG LAYER ── */
    #svg-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

      position: absolute;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.18);
      transform: translateX(-50%);
      white-space: nowrap;
      pointer-events: none;

    /* ── EDUCATION PHASE BARS ── */
    .edu-phase {
      position: absolute;
      height: var(--line-h);
      border-radius: 0;
    }

    .node {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
    }
    .node-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid;
      background: var(--bg);
      flex-shrink: 0;
      transition: transform 0.15s, box-shadow 0.15s;
      z-index: 2;
    }
    .node:hover .node-dot {
      transform: scale(1.5);
      box-shadow: 0 0 8px currentColor;
    }
    .node-connector {
      width: 1px;
      background: currentColor;
      opacity: 0.35;
      flex-shrink: 0;
    }
    .node-card {
      padding: 5px 8px;
      border-radius: 3px;
      border: 0.5px solid;
      background: rgba(13,15,11,0.9);
      max-width: 160px;
      pointer-events: none;
      transition: opacity 0.15s;
    }
    .node:hover .node-card {
      opacity: 1 !important;
    }
    .node-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.06em;
      line-height: 1.5;
      color: #ccc;
    }
    .node-type-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.45rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.6;
      margin-bottom: 2px;
    }

    /* ABOVE nodes */
    .node.above {
      flex-direction: column-reverse;
      transform: translateX(-50%);
    }
    .node.above .node-connector {
      order: -1;
    }
    .node.above .node-card {
      margin-bottom: 2px;
    }

    /* BELOW nodes */
    .node.below {
      flex-direction: column;
      transform: translateX(-50%);
    }
    .node.below .node-card {
      margin-top: 2px;
    }

    /* ── SKILL BADGES ── */
    .skill-badge {
      position: absolute;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
    }
    .skill-pip-row {
      display: flex;
      gap: 2px;
      margin-bottom: 3px;
    }
    .skill-pip {
      width: 5px; height: 5px;
      border-radius: 1px;
    }
    .skill-pip.filled { opacity: 1; }
    .skill-pip.empty { opacity: 0.2; border: 1px solid currentColor; background: transparent !important; }
    .skill-inner {
      padding: 4px 7px;
      border-radius: 2px;
      border: 0.5px solid;
      background: rgba(13,15,11,0.92);
      text-align: center;
      min-width: 70px;
    }
    .skill-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.06em;
      color: #ccc;
      line-height: 1.4;
    }
    .skill-level-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.42rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 1px;
    }
    .skill-connector {
      width: 1px;
      background: currentColor;
      opacity: 0.3;
    }

    .honor-star {
      font-size: 0.7rem;
      line-height: 1;
      color: var(--col-honor);
      text-shadow: 0 0 6px var(--col-honor);

    /* ── TOOLTIP ── */
    #tooltip {
      position: fixed;
      z-index: 300;
      background: rgba(13,15,11,0.96);
      border: 0.5px solid rgba(138,158,126,0.4);
      border-radius: 4px;
      padding: 8px 12px;
      max-width: 260px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      line-height: 1.6;
      color: #ccc;
    }
    #tooltip.visible { opacity: 1; }
    #tooltip .tt-title { font-size: 0.68rem; color: #fff; margin-bottom: 3px; font-family: 'Inter', sans-serif; }

    /* ── SCAN LINE EFFECT ── */
    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
    }

    @media (max-width: 640px) {
      nav { padding: 0 1rem; }
      .nav-links { gap: 0.8rem; }
      .nav-links a { font-size: 0.55rem; }
      .legend, .edu-legend { display: none; }
    }

</head>

  // Fieldwork skills
  { date:'2020-03-01', name:'Large Animal\nHandling', level:'familiar',   stagger:6, projectId:'ev-deer',       full:"Acquired during Père David's Deer project" },
  { date:'2022-06-01', name:'Field Work',             level:'familiar',   stagger:7, projectId:'ev-sassa-proj', full:'Acquired during Sassafras tzumu fieldwork' },
  { date:'2022-09-01', name:'GIS',                    level:'familiar',   stagger:8, projectId:'ev-alan',       full:'Acquired during ALAN & detritivores project' },
  { date:'2022-11-01', name:'Camera Trap',            level:'familiar',   stagger:9, projectId:null,           full:'Camera trap surveys · November 2022' },
  { date:'2020-11-01', name:'Metagenomics\nAnalysis', level:'familiar',   stagger:9, projectId:null,           full:'Bioinformatics · November 2020' },
];

// ─── BUILD DOM ────────────────────────────────────────────
const wrap    = document.getElementById('canvas-wrap');
let   svgEl   = document.getElementById('svg-layer');
const scrollEl= document.getElementById('scrollOuter');

function build() {
  const vh = VIEW_H();
  const cy = CENTER_Y();

  wrap.style.width  = TOTAL_W + 'px';
  wrap.style.height = vh + 'px';
  svgEl.setAttribute('width',  TOTAL_W);
  svgEl.setAttribute('height', vh);
  svgEl.innerHTML = '';

  // ── center line ──
  const lineY = cy;
  const baseLine = makeSVGEl('line', { x1:0, y1:lineY, x2:TOTAL_W, y2:lineY,
    stroke:'rgba(255,255,255,0.08)', 'stroke-width':'1' });
  svgEl.appendChild(baseLine);

  // ── education phases on the center line ──
  EDU_PHASES.forEach(ph => {
    const x1 = dateToX(ph.start);
    const x2 = dateToX(ph.end);
    const w  = x2 - x1;
    const BAR_H = 6;
    if (ph.camouflage) {
      // draw camouflage pattern via SVG rect + pattern
      const patId = 'camo-' + Math.random().toString(36).slice(2);
      const defs  = makeSVGEl('defs');
      const pat   = makeSVGEl('pattern', { id:patId, x:0, y:0, width:10, height:10, patternUnits:'userSpaceOnUse' });
      [['#6b7c5a',0],['#4a5e3a',0.3],['#8a9060',0.6],['#5a6e48',0.1]].forEach(([c,op],i) => {
        const r = makeSVGEl('rect', { x:(i%2)*5, y:Math.floor(i/2)*5, width:5, height:5, fill:c });
        pat.appendChild(r);
      });
      defs.appendChild(pat);
      svgEl.appendChild(defs);
      const r = makeSVGEl('rect', { x:x1, y:lineY-BAR_H/2, width:w, height:BAR_H, fill:`url(#${patId})` });
      svgEl.appendChild(r);
    } else {
      const r = makeSVGEl('rect', { x:x1, y:lineY-BAR_H/2, width:w, height:BAR_H, fill:ph.color });
      svgEl.appendChild(r);
    }
  });

  // ── year ticks & labels ──
  for (let y = 2018; y <= 2026; y++) {
    const x = dateToX(`${y}-09-15`);
    const tick = makeSVGEl('line', { x1:x, y1:lineY-10, x2:x, y2:lineY+10,
      stroke:'rgba(255,255,255,0.12)', 'stroke-width':'1' });
    svgEl.appendChild(tick);
    const lbl = document.createElement('div');
    lbl.className = 'year-label';
    lbl.textContent = y;
    lbl.style.left = x + 'px';
    lbl.style.top  = (lineY + 14) + 'px';
    wrap.appendChild(lbl);
  }

  // ── collect node positions (for dashed line connections) ──
  const nodePos = {};  // id → {x, y}

  // ── ABOVE events ──
  const ROW_H_ABOVE = 72;
  ABOVE_EVENTS.forEach(ev => {
    const x   = dateToX(ev.date);
    const col = ev.type === 'honor' ? C.honor : C.pub;
    const connLen = ROW_H_ABOVE * (ev.stagger + 1) - 12;
    const cardY   = lineY - ROW_H_ABOVE * (ev.stagger + 1);
    const dotY    = lineY - 5;

    // SVG connector line
    const line = makeSVGEl('line', { x1:x, y1:dotY, x2:x, y2:cardY + 5,
      stroke:col, 'stroke-width':'0.8', opacity:'0.35' });
    svgEl.appendChild(line);

    // dot on line
    const dot = makeSVGEl('circle', { cx:x, cy:lineY, r:5,
      fill:'#0d0f0b', stroke:col, 'stroke-width':'2' });
    dot.style.cursor = 'pointer';
    svgEl.appendChild(dot);

    // card
    const card = document.createElement('div');
    card.className = 'node-card';
    card.style.cssText = `
      position:absolute; left:${x}px; top:${cardY}px;
      transform:translateX(-50%) translateY(-100%);
      border-color:${col}44; max-width:150px; opacity:0.85;
    `;
    const typeBadge = document.createElement('div');
    typeBadge.className = 'node-type-badge';
    typeBadge.style.color = col;
    typeBadge.textContent = ev.type === 'honor' ? '★ HONOUR' : '◆ PUB';
    const lbl = document.createElement('div');
    lbl.className = 'node-label';
    lbl.textContent = ev.label;
    if (ev.type === 'honor') {
      lbl.style.color = col;
      card.style.borderColor = col + '66';
    }
    card.appendChild(typeBadge);
    card.appendChild(lbl);
    card.addEventListener('mouseenter', e => showTip(e, ev.label, ev.full, col));
    card.addEventListener('mouseleave', hideTip);
    card.style.cursor = 'pointer';
    wrap.appendChild(card);

    nodePos[ev.id] = { x, y: lineY };
  });

  // ── BELOW events ──
  const ROW_H_BELOW = 58;
  BELOW_EVENTS.forEach(ev => {
    const x   = dateToX(ev.date);
    const col = ev.type === 'service' ? C.service : C.project;
    const cardY = lineY + ROW_H_BELOW * (ev.stagger + 1);
    const dotY  = lineY + 5;

    const line = makeSVGEl('line', { x1:x, y1:dotY, x2:x, y2:cardY - 2,
      stroke:col, 'stroke-width':'0.8', opacity:'0.35' });
    svgEl.appendChild(line);

    const dot = makeSVGEl('circle', { cx:x, cy:lineY, r:5,
      fill:'#0d0f0b', stroke:col, 'stroke-width':'2' });
    dot.style.cursor = 'pointer';
    svgEl.appendChild(dot);

    const card = document.createElement('div');
    card.className = 'node-card';
    card.style.cssText = `
      position:absolute; left:${x}px; top:${cardY}px;
      transform:translateX(-50%);
      border-color:${col}44; max-width:150px; opacity:0.82;
    `;
    const typeBadge = document.createElement('div');
    typeBadge.className = 'node-type-badge';
    typeBadge.style.color = col;
    typeBadge.textContent = ev.type === 'service' ? '▪ SERVICE' : '▸ PROJECT';
    const lbl = document.createElement('div');
    lbl.className = 'node-label';
    lbl.textContent = ev.label;
    card.appendChild(typeBadge);
    card.appendChild(lbl);
    card.addEventListener('mouseenter', e => showTip(e, ev.label, ev.full, col));
    card.addEventListener('mouseleave', hideTip);
    card.style.cursor = 'pointer';
    wrap.appendChild(card);

    nodePos[ev.id] = { x, y: lineY };
  });

  // ── SKILLS ──
  const SKILL_ROW_H = 48;
  // Track x-positions used at each stagger to avoid overlap (simple)
  SKILLS.forEach(sk => {
    const x   = dateToX(sk.date);
    const col = sk.level === 'proficient' ? C.proficient : C.familiar;
    const pips = sk.level === 'proficient' ? 3 : 1;
    const totalPips = 3;
    const rowOffset = sk.stagger * SKILL_ROW_H;
    const badgeTopY = lineY + 12 + rowOffset;

    // connector from timeline to badge
    const connLen = rowOffset + 12;
    const svgConn = makeSVGEl('line', { x1:x, y1:lineY+5, x2:x, y2:badgeTopY,
      stroke:col, 'stroke-width':'0.8', opacity:'0.2' });
    svgEl.appendChild(svgConn);

    // badge element
    const badge = document.createElement('div');
    badge.className = 'skill-badge';
    badge.style.cssText = `left:${x}px; top:${badgeTopY}px;`;
    badge.style.color = col;

    // pip row
    const pipRow = document.createElement('div');
    pipRow.className = 'skill-pip-row';
    for (let i = 0; i < totalPips; i++) {
      const pip = document.createElement('div');
      pip.className = 'skill-pip ' + (i < pips ? 'filled' : 'empty');
      pip.style.background = col;
      pipRow.appendChild(pip);
    }

    const inner = document.createElement('div');
    inner.className = 'skill-inner';
    inner.style.borderColor = col + '55';

    const sName = document.createElement('div');
    sName.className = 'skill-name';
    sName.textContent = sk.name.replace(/\n/g, ' ');

    const sLevel = document.createElement('div');
    sLevel.className = 'skill-level-text';
    sLevel.style.color = col;
    sLevel.textContent = sk.level === 'proficient' ? '▲ PROFICIENT' : '◉ FAMILIAR';

    inner.appendChild(sName);
    inner.appendChild(sLevel);
    badge.appendChild(pipRow);
    badge.appendChild(inner);
    badge.addEventListener('mouseenter', e => showTip(e, sk.name.replace(/\n/g,' '), sk.full, col));
    badge.addEventListener('mouseleave', hideTip);
    badge.style.cursor = 'pointer';
    wrap.appendChild(badge);

    // Store position for dashed line
    nodePos['skill-' + sk.name + sk.date] = { x, y: badgeTopY };

    // Dashed line to project
    if (sk.projectId && nodePos[sk.projectId]) {
      const proj = nodePos[sk.projectId];
      const d = `M${proj.x},${proj.y + 5} C${proj.x},${proj.y + 40} ${x},${badgeTopY - 30} ${x},${badgeTopY}`;
      const dash = makeSVGEl('path', { d,
        stroke:col, 'stroke-width':'0.8', 'stroke-dasharray':'3 3',
        fill:'none', opacity:'0.35' });
      svgEl.appendChild(dash);
    }
  });
}

function makeSVGEl(tag, attrs = {}) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

// ─── TOOLTIP ──────────────────────────────────────────────
const tip = document.getElementById('tooltip');
function showTip(e, title, body, col) {
  tip.innerHTML = `<div class="tt-title" style="color:${col}">${title}</div>${body}`;
  tip.classList.add('visible');
  moveTip(e);
}
function hideTip() { tip.classList.remove('visible'); }
function moveTip(e) {
  let x = e.clientX + 14, y = e.clientY - 8;
  if (x + 270 > window.innerWidth)  x = e.clientX - 280;
  if (y + 100 > window.innerHeight) y = e.clientY - 100;
  tip.style.left = x + 'px';
  tip.style.top  = y + 'px';
}
document.addEventListener('mousemove', e => { if (tip.classList.contains('visible')) moveTip(e); });

// ─── DRAG TO SCROLL ───────────────────────────────────────
let isDown = false, startX, scrollLeft;
scrollEl.addEventListener('mousedown', e => {
  isDown = true; startX = e.pageX - scrollEl.offsetLeft; scrollLeft = scrollEl.scrollLeft;
  scrollEl.style.cursor = 'grabbing';
});
scrollEl.addEventListener('mouseleave', () => { isDown = false; scrollEl.style.cursor = 'grab'; });
scrollEl.addEventListener('mouseup',    () => { isDown = false; scrollEl.style.cursor = 'grab'; });
scrollEl.addEventListener('mousemove', e => {
  if (!isDown) return;
  e.preventDefault();
  const x    = e.pageX - scrollEl.offsetLeft;
  const walk = (x - startX) * 1.2;
  scrollEl.scrollLeft = scrollLeft - walk;
});

// ─── INIT ─────────────────────────────────────────────────
build();

// Scroll to rightmost on load
requestAnimationFrame(() => {
  scrollEl.scrollLeft = scrollEl.scrollWidth - scrollEl.clientWidth;
});

window.addEventListener('resize', () => {
  // Clear dynamic children (keep svg), rebuild
  Array.from(wrap.children).forEach(c => { if (c !== svgEl) c.remove(); });
  build();
});
</script>
</body>
</html>
